<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Quản Trị - Đại Ca Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .sidebar { min-height: 100vh; background-color: #343a40; color: white; }
        .nav-link { color: #c2c7d0; margin-bottom: 5px; cursor: pointer; }
        .nav-link:hover, .nav-link.active { background-color: #007bff; color: white; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-3 shadow-sm">
            <h4 class="text-center fw-bold mb-4 mt-2 text-warning"><i class="bi bi-shield-lock-fill me-2"></i>ADMIN</h4>
            <hr class="text-secondary">
            <ul class="nav nav-pills flex-column" id="adminTabs" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active w-100 text-start" data-bs-toggle="tab" data-bs-target="#orders" type="button">
                        <i class="bi bi-receipt me-2"></i> Quản lý Đơn hàng
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link w-100 text-start mt-2" data-bs-toggle="tab" data-bs-target="#products" type="button">
                        <i class="bi bi-box-seam me-2"></i> Quản lý Thực đơn
                    </button>
                </li>
            </ul>
        </div>

        <div class="col-md-10 p-4">
            <div class="tab-content">

                <div class="tab-pane fade show active" id="orders">
                    <h2 class="fw-bold mb-4">Quản lý Đơn hàng</h2>
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-0">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-dark">
                                <tr>
                                    <th>Mã Đơn</th>
                                    <th>Khách hàng</th>
                                    <th>Hình thức</th>
                                    <th>Chi tiết nhận</th>
                                    <th>Tổng tiền</th>
                                    <th>Trạng thái</th>
                                    <th class="text-center">Thao tác</th>
                                </tr>
                                </thead>
                                <tbody id="adminOrderList">
                                <tr><td colspan="7" class="text-center py-3">Đang tải dữ liệu đơn hàng...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="products">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="fw-bold">Quản lý Thực đơn</h2>
                        <button class="btn btn-success fw-bold" data-bs-toggle="modal" data-bs-target="#addProductModal">
                            <i class="bi bi-plus-lg me-1"></i> Thêm món mới
                        </button>
                    </div>

                    <div class="card shadow-sm border-0">
                        <div class="card-body p-0">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Hình ảnh</th>
                                    <th>Tên món</th>
                                    <th>Giá bán</th>
                                    <th>Trạng thái</th>
                                    <th class="text-center">Thao tác</th>
                                </tr>
                                </thead>
                                <tbody id="adminProductList">
                                <tr><td colspan="6" class="text-center py-3">Đang tải dữ liệu món ăn...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="addProductModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title fw-bold">Thêm Món Mới</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Tên món ăn</label>
                    <input type="text" id="newProductName" class="form-control" placeholder="Nhập tên món...">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Giá bán (VNĐ)</label>
                    <input type="number" id="newProductPrice" class="form-control" placeholder="Ví dụ: 50000">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Đường dẫn hình ảnh (URL)</label>
                    <input type="text" id="newProductImage" class="form-control" placeholder="https://...">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Trạng thái</label>
                    <select id="newProductStatus" class="form-select">
                        <option value="active">Đang bán</option>
                        <option value="hidden">Tạm ẩn (Hết hàng)</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-success fw-bold" onclick="submitNewProduct()">Lưu món này</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let addModal;

    window.addEventListener('DOMContentLoaded', () => {
        addModal = new bootstrap.Modal(document.getElementById('addProductModal'));

        // Gọi dữ liệu thật từ máy chủ lên màn hình quản trị
        loadAdminProducts();
        loadAdminOrders();
    });

    // ================= 1. QUẢN LÝ THỰC ĐƠN (PRODUCTS) =================
    async function loadAdminProducts() {
        try {
            const response = await fetch('/api/products');
            const products = await response.json();

            const tbody = document.getElementById('adminProductList');
            tbody.innerHTML = '';

            if(products.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-3">Thực đơn đang trống. Hãy thêm món mới!</td></tr>`;
                return;
            }

            products.forEach(item => {
                let badgeClass = item.status === 'active' ? 'bg-success' : 'bg-secondary';
                let statusText = item.status === 'active' ? 'Đang bán' : 'Tạm ẩn';

                tbody.innerHTML += `
                    <tr>
                        <td class="fw-bold">#${item.id}</td>
                        <td><img src="${item.imageUrl}" class="rounded" style="width: 50px; height: 50px; object-fit: cover;" onerror="this.src='https://via.placeholder.com/50'"></td>
                        <td class="fw-bold">${item.name}</td>
                        <td class="text-danger fw-bold">${item.price.toLocaleString('vi-VN')}đ</td>
                        <td><span class="badge ${badgeClass}">${statusText}</span></td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-danger" onclick="deleteProduct(${item.id})"><i class="bi bi-trash"></i> Xóa</button>
                        </td>
                    </tr>
                `;
            });
        } catch (error) {
            console.error("Lỗi tải món ăn:", error);
            document.getElementById('adminProductList').innerHTML = `<tr><td colspan="6" class="text-center text-danger py-3">Lỗi kết nối API lấy danh sách món ăn!</td></tr>`;
        }
    }

    async function submitNewProduct() {
        const name = document.getElementById('newProductName').value.trim();
        const price = document.getElementById('newProductPrice').value.trim();
        const imageUrl = document.getElementById('newProductImage').value.trim();
        const status = document.getElementById('newProductStatus').value;

        if(!name || !price) {
            alert("Đại ca vui lòng nhập tên và giá món ăn!");
            return;
        }

        const newProduct = {
            name: name,
            price: parseInt(price),
            imageUrl: imageUrl || "https://via.placeholder.com/400x300?text=Chua+co+anh",
            status: status
        };

        try {
            const response = await fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newProduct)
            });

            if (response.ok) {
                alert("Đã lưu món ăn vào Database thành công!");
                addModal.hide();
                document.getElementById('newProductName').value = '';
                document.getElementById('newProductPrice').value = '';
                document.getElementById('newProductImage').value = '';
                loadAdminProducts();
            }
        } catch (error) {
            console.error("Lỗi thêm món:", error);
            alert("Có lỗi xảy ra khi lưu món ăn!");
        }
    }

    async function deleteProduct(id) {
        if(confirm(`Đại ca có chắc chắn muốn xóa món ID #${id} vĩnh viễn khỏi Database không?`)) {
            try {
                const response = await fetch(`/api/products/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadAdminProducts();
                }
            } catch (error) {
                console.error("Lỗi xóa món:", error);
                alert("Không thể xóa món ăn này!");
            }
        }
    }

    // ================= 2. QUẢN LÝ ĐƠN HÀNG (ORDERS) =================
    async function loadAdminOrders() {
        try {
            const response = await fetch('/api/orders');
            const orders = await response.json();

            const tbody = document.getElementById('adminOrderList');
            tbody.innerHTML = '';

            if (orders.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4">Chưa có đơn hàng nào được đặt.</td></tr>`;
                return;
            }

            // Đảo ngược mảng để đơn hàng mới nhất nhảy lên đầu bảng
            orders.reverse().forEach(order => {
                let badgeClass = 'bg-warning';
                let statusText = 'Chờ xử lý';
                if(order.status === 'COMPLETED') { badgeClass = 'bg-success'; statusText = 'Đã hoàn thành'; }
                if(order.status === 'CANCELLED') { badgeClass = 'bg-danger'; statusText = 'Đã hủy đơn'; }

                let details = order.orderType === 'at_shop' ? `Bàn số: ${order.tableNumber}` : order.deliveryAddress;

                tbody.innerHTML += `
                    <tr>
                        <td class="fw-bold text-primary">${order.orderCode}</td>
                        <td>
                            <div><strong>${order.customerName}</strong></div>
                            <small class="text-muted">${order.customerPhone}</small>
                        </td>
                        <td><span class="badge bg-info">${order.orderType === 'at_shop' ? 'Tại quán' : 'Giao hàng'}</span></td>
                        <td><small>${details}</small></td>
                        <td class="text-danger fw-bold">${order.totalAmount.toLocaleString('vi-VN')}đ</td>
                        <td><span class="badge ${badgeClass}">${statusText}</span></td>
                        <td class="text-center">
                            ${order.status === 'PENDING' ? `
                                <button class="btn btn-sm btn-success me-1 fw-bold" onclick="updateStatus(${order.id}, 'COMPLETED')"><i class="bi bi-check-lg"></i> Giao món</button>
                                <button class="btn btn-sm btn-outline-danger fw-bold" onclick="updateStatus(${order.id}, 'CANCELLED')"><i class="bi bi-x-lg"></i> Hủy</button>
                            ` : `<span class="text-muted small">Hoàn tất</span>`}
                        </td>
                    </tr>
                `;
            });
        } catch (error) {
            console.error("Lỗi tải đơn hàng:", error);
            document.getElementById('adminOrderList').innerHTML = `<tr><td colspan="7" class="text-center text-danger py-3">Lỗi kết nối API lấy danh sách đơn hàng!</td></tr>`;
        }
    }

    async function updateStatus(id, newStatus) {
        try {
            const response = await fetch(`/api/orders/${id}/status?status=${newStatus}`, {
                method: 'PUT'
            });
            if (response.ok) {
                loadAdminOrders();
            }
        } catch (error) {
            console.error("Lỗi đổi trạng thái đơn:", error);
            alert("Lỗi cập nhật đơn hàng!");
        }
    }
</script>
</body>
</html>
